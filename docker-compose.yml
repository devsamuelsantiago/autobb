version: "3.9"

services:
  # ── Backend API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python backend/main.py
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Worker (loop de scans) ───────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python backend/worker.py
    env_file: .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      - api
    restart: unless-stopped
