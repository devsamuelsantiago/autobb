name: AutoBB Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # a cada 6 horas
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install subfinder
        run: go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest

      - name: Install scan4all
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/GhostTroops/scan4all/releases/latest \
            | grep browser_download_url \
            | grep linux_amd64.zip \
            | cut -d '"' -f 4)
          wget -q "$DOWNLOAD_URL" -O scan4all.zip
          unzip -o -q scan4all.zip scan4all
          chmod +x scan4all
          sudo mv scan4all /usr/local/bin/scan4all

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Create .env
        run: |
          {
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}"
            echo "H1_CSRF_TOKEN=${{ secrets.H1_CSRF_TOKEN }}"
            echo "SCAN4ALL_BIN=/usr/local/bin/scan4all"
            echo "SUBFINDER_BIN=$HOME/go/bin/subfinder"
            echo "SUBFINDER_TIMEOUT=1200000"
            echo "SCAN_TIMEOUT=360000"
            echo "WORKER_INTERVAL=21600"
            echo "PARALLEL_WORKERS=2"
            echo "RESCAN_HOURS=72"
            echo "DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}"
          } > .env

      - name: Verify binaries and .env
        run: |
          echo "=== .env ===" && cat .env
          echo "=== scan4all ===" && ls -la /usr/local/bin/scan4all && /usr/local/bin/scan4all --version || true
          echo "=== subfinder ===" && ls -la $HOME/go/bin/subfinder || true

      - name: Run worker (one cycle)
        run: |
          cd backend
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from worker import run_worker_once
          run_worker_once()
          "

  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
